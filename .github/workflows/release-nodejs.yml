name: Release Node.js

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release-nodejs:
    name: Release Node.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Release
        run: npm run build
