name: Draft release notes

on:
  push:
    tags:
      - '*'
    branches:
      - main

permissions:
  contents: write

jobs:
  release-drafter:
    name: Draft release notes
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Set version
        id: version
        env:
          RELEASE_VERSION_SCHEME: ${{ vars.RELEASE_VERSION_SCHEME }}
        run: |
          SCHEME="${RELEASE_VERSION_SCHEME}"
          if [ "${SCHEME}" = "calver" ]; then
            VERSION="$(date "+%y.%-m").0"
            echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
            echo "Using CalVer: ${VERSION}"
          else
            echo "Using SemVer (default)"
          fi

      - name: Draft release notes
        uses: release-drafter/release-drafter@73b95fa1c286dfd6802a4f949b07dad6149f2b0f # v7
        with:
          tag: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
