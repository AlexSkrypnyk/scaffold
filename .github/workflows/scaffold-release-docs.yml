name: Release Scaffold docs

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  release-docs:
    name: Release Scaffold documentation
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.base_url }}

    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7

      - name: Install dependencies
        run: npm install
        working-directory: '${{ github.workspace }}/.scaffold/docs'

      - name: Set release version
        working-directory: ${{ github.workspace }}
        env:
          INPUTS_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="${INPUTS_VERSION:-${REF_NAME}}"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "Release version: $version"

      - name: Bake version into init.sh
        working-directory: ${{ github.workspace }}
        run: |
          escaped=$(printf '%s' "${RELEASE_VERSION}" | sed -e 's/[\\&|]/\\&/g')
          sed -i "s|^SCAFFOLD_VERSION=\"dev\"|SCAFFOLD_VERSION=\"${escaped}\"|" init.sh
          grep '^SCAFFOLD_VERSION=' init.sh

      - name: Build documentation site
        run: npm run build
        working-directory: '${{ github.workspace }}/.scaffold/docs'

      - name: Setup GitHub pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
        id: pages

      - name: Upload documentation site
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ".scaffold/docs/build"

      - name: Deploy documentation site
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
