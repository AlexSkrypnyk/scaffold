name: Test Actions

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - 'feature/**'

jobs:
  test-actions:
    name: Test Actions
    runs-on: ubuntu-latest

    permissions:
      contents: read # Read workflow files for the linters.
      security-events: write # Upload the zizmor SARIF report to code scanning.
      actions: read # Required by the SARIF upload on private repositories.

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check coding standards with yamllint
        run: yamllint --config-file .github/.yamllint-for-gha.yml .github/workflows
        continue-on-error: ${{ vars.CI_ACTIONLINT_IGNORE_FAILURE == '1' }}

      - name: Check coding standards with actionlint
        run: docker run --rm -v "${GITHUB_WORKSPACE:-.}":/app --workdir /app rhysd/actionlint:1.7.4
        continue-on-error: ${{ vars.CI_ACTIONLINT_IGNORE_FAILURE == '1' }}

      - name: Check GitHub Actions security with Zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          inputs: .github/workflows
          config: zizmor.yml
        continue-on-error: ${{ vars.CI_ZIZMOR_IGNORE_FAILURE == '1' }}
