name: Release PHP

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-php:
    name: Release PHP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Cache Composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-${{ hashFiles('**/composer.lock') }}

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: 8.4

      - name: Install dependencies
        run: composer install

      # yamllint disable-line #;< PHP_PHAR
      - name: Set release version
        env:
          INPUTS_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="${INPUTS_VERSION:-${REF_NAME}}"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "Release version: $version"
          sed -i "s/\"yourproject-version\": \"development\"/\"yourproject-version\": \"${version}\"/g" box.json

      - name: Build PHAR
        run: composer build

      - name: Test PHAR
        run: |
          ./.build/php-command.phar --version
          ./.build/php-command.phar || exit 1
      # yamllint disable-line #;> PHP_PHAR

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          files: |
            #;< PHP_PHAR
            ./.build/php-command.phar
            #;> PHP_PHAR
            #;< !PHP_PHAR
            php-script
            #;> !PHP_PHAR
