name: Test Docker

on:
  schedule:
    - cron: '23 4 * * *'
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - 'feature/**'
  workflow_dispatch:
    inputs:
      enable_terminal:
        type: boolean
        description: 'Enable terminal session.'
        required: false
        default: false

permissions:
  contents: read

jobs:
  test-docker:
    name: Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@__HASH__ # __VERSION__
        with:
          persist-credentials: false

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@__HASH__ # __VERSION__
        with:
          dockerfile: Dockerfile
        continue-on-error: ${{ vars.CI_LINT_IGNORE_FAILURE == '1' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@__HASH__ # __VERSION__

      - name: Build Docker image
        uses: docker/build-push-action@__HASH__ # __VERSION__
        with:
          context: .
          push: false
          load: true
          tags: yodashut/force-crystal:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: docker run --rm yodashut/force-crystal:test

      - name: Setup tmate session
        if: ${{ !cancelled() && github.event.inputs.enable_terminal }}
        uses: mxschmitt/action-tmate@__HASH__ # __VERSION__
        timeout-minutes: 30

  push-canary-to-registry:
    name: Docker canary
    needs: test-docker
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@__HASH__ # __VERSION__
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@__HASH__ # __VERSION__

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@__HASH__ # __VERSION__

      - name: Log in to Docker Hub
        uses: docker/login-action@__HASH__ # __VERSION__
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@__HASH__ # __VERSION__
        with:
          images: ${{ vars.DOCKER_IMAGE || 'yodashut/force-crystal' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@__HASH__ # __VERSION__
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKER_IMAGE || 'yodashut/force-crystal' }}:canary
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
